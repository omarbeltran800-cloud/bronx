<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bronx Admin | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        /* Si esta clase no existe, el admin no se oculta */
        .oculto { display: none !important; }
    </style>
</head>
<body class="p-4">

    <div id="pantalla-login" class="fixed inset-0 bg-black flex flex-col items-center justify-center p-6 z-50">
        <h1 class="text-4xl font-black italic mb-8 tracking-tighter">BRONX <span class="text-orange-500">ADMIN</span></h1>
        <div class="w-full max-w-xs space-y-4 text-center">
            <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-[0.2em]">Acceso Restringido</p>
            <input type="password" id="input-pass" placeholder="Código de Acceso" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center text-lg outline-none focus:border-orange-500 text-white">
            <button onclick="validarAcceso()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest active:scale-95 transition-all">Desbloquear Panel</button>
            <p id="error-txt" class="text-red-500 text-[10px] font-bold oculto">CÓDIGO INCORRECTO</p>
        </div>
    </div>

    <div id="panel-principal" class="oculto">
        <header class="mb-8 border-b border-zinc-900 pb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter">Bronx <span class="text-orange-500">Admin</span></h1>
                <p id="label-semana" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-bold text-zinc-500 underline">Cerrar</button>
        </header>

        <div id="admin-citas" class="space-y-6">
            </div>
    </div>

    <script>
        // === LA LLAVE MAESTRA ===
        const PASSWORD_CORRECTO = "BRONX2026"; 

        function validarAcceso() {
            const passIngresada = document.getElementById('input-pass').value;
            const login = document.getElementById('pantalla-login');
            const panel = document.getElementById('panel-principal');
            const error = document.getElementById('error-txt');

            if(passIngresada === PASSWORD_CORRECTO) {
                login.classList.add('oculto'); // Escondemos el login
                panel.classList.remove('oculto'); // Mostramos el admin
                iniciarBaseDeDatos(); // Arrancamos Firebase
            } else {
                error.classList.remove('oculto');
                document.getElementById('input-pass').value = "";
            }
        }

        // === CONFIGURACIÓN FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyD16imBLTSC6YhiwKJK5PGza5g3a1N3J08",
            authDomain: "bronxbarber-d9cb3.firebaseapp.com",
            databaseURL: "https://bronxbarber-d9cb3-default-rtdb.firebaseio.com",
            projectId: "bronxbarber-d9cb3",
            storageBucket: "bronxbarber-d9cb3.firebasestorage.app",
            messagingSenderId: "674799529579",
            appId: "1:674799529579:web:813f9c27b2ee8f17e68b2e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function getWeekNumber() {
            const d = new Date(); d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(),0,1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }
        const currentWeek = `2026-W${getWeekNumber()}`;
        document.getElementById('label-semana').innerText = `GESTIONANDO: ${currentWeek}`;

        function iniciarBaseDeDatos() {
            const container = document.getElementById('admin-citas');
            const barberos = ["Barbero 1", "Barbero 2", "Barbero 3", "Barbero 4"];
            const dias = ["Lunes", "Martes", "Miercoles", "Jueves", "Viernes", "Sabado", "Domingo"];

            db.ref(`citas/${currentWeek}`).on('value', (snapshot) => {
                container.innerHTML = "";
                const data = snapshot.val() || {};

                barberos.forEach(barber => {
                    const card = document.createElement('div');
                    card.className = "bg-zinc-900/50 rounded-3xl p-5 border border-zinc-800";
                    card.innerHTML = `<h2 class="text-xs font-black mb-4 text-zinc-500 uppercase tracking-widest">${barber}</h2>`;
                    
                    const list = document.createElement('div');
                    list.className = "space-y-3";
                    let hayCitas = false;

                    dias.forEach(dia => {
                        const citasDia = data[dia] ? data[dia][barber] : null;
                        if(citasDia) {
                            Object.keys(citasDia).forEach(key => {
                                hayCitas = true;
                                const c = citasDia[key];
                                const row = document.createElement('div');
                                row.className = "flex justify-between items-center bg-black p-4 rounded-2xl border border-zinc-800";
                                row.innerHTML = `
                                    <div>
                                        <p class="text-[9px] text-orange-500 font-bold uppercase">${dia} - ${c.hora}</p>
                                        <p class="text-sm font-bold text-white">${c.cliente}</p>
                                        <p class="text-[10px] text-zinc-500">${c.tel}</p>
                                    </div>
                                    <button onclick="eliminar('${dia}','${barber}','${key}')" class="text-red-500 text-[10px] font-bold">LIBERAR</button>
                                `;
                                list.appendChild(row);
                            });
                        }
                    });

                    if(!hayCitas) list.innerHTML = `<p class="text-[10px] text-zinc-800 italic">Agenda vacía</p>`;
                    card.appendChild(list);
                    container.appendChild(card);
                });
            });
        }

        function eliminar(dia, barber, key) {
            if(confirm("¿Borrar cita?")) {
                db.ref(`citas/${currentWeek}/${dia}/${barber}/${key}`).remove();
            }
        }
    </script>
</body>
</html>
