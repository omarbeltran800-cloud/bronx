<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bronx Admin | Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .oculto { display: none !important; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="seccion-login" class="fixed inset-0 bg-black flex flex-col items-center justify-center p-6 z-50">
        <h1 class="text-4xl font-black italic mb-8 tracking-tighter uppercase text-white">Bronx <span class="text-orange-500">Admin</span></h1>
        <div class="w-full max-w-xs space-y-4 text-center">
            <input type="password" id="input-password" placeholder="Código" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center text-white outline-none focus:border-orange-500">
            <button onclick="validarPassword()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[11px] tracking-widest">Entrar</button>
            <p id="error-msg" class="text-red-600 text-[10px] font-black oculto uppercase">Acceso Denegado</p>
        </div>
    </div>

    <div id="seccion-admin" class="oculto">
        <header class="mb-10 border-b border-zinc-900 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Panel <span class="text-orange-500">Bronx</span></h1>
                <p id="display-semana" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900 text-zinc-500 text-[9px] font-black px-4 py-2 rounded-full border border-zinc-800 uppercase italic">Cerrar</button>
        </header>

        <section class="mb-10 bg-zinc-900/30 p-6 rounded-[2.5rem] border border-zinc-800">
            <h2 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.3em] mb-5 text-center italic">Gestión de Descansos</h2>
            <div class="grid grid-cols-2 gap-3">
                <select id="select-dia-descanso" class="bg-black border border-zinc-800 text-[10px] p-4 rounded-2xl text-white outline-none">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option><option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option><option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option>
                </select>
                <select id="select-barber-descanso" class="bg-black border border-zinc-800 text-[10px] p-4 rounded-2xl text-white outline-none">
                    <option value="Barbero 1">Barbero 1</option><option value="Barbero 2">Barbero 2</option><option value="Barbero 3">Barbero 3</option><option value="Barbero 4">Barbero 4</option>
                </select>
                <button onclick="toggleDescanso(true)" class="col-span-2 bg-red-600 text-white font-black py-4 rounded-2xl text-[9px] uppercase tracking-widest active:scale-95 transition-all">Bloquear Día</button>
                <button onclick="toggleDescanso(false)" class="col-span-2 bg-zinc-800 text-zinc-400 font-black py-4 rounded-2xl text-[9px] uppercase tracking-widest active:scale-95 transition-all">Activar Barbero</button>
            </div>
        </section>

        <div id="contenedor-agendas" class="space-y-8"></div>
    </div>

    <script>
        const PASSWORD_SISTEMA = "BRONX2026"; 
        const firebaseConfig = {
            apiKey: "AIzaSyD16imBLTSC6YhiwKJK5PGza5g3a1N3J08",
            authDomain: "bronxbarber-d9cb3.firebaseapp.com",
            databaseURL: "https://bronxbarber-d9cb3-default-rtdb.firebaseio.com",
            projectId: "bronxbarber-d9cb3",
            storageBucket: "bronxbarber-d9cb3.firebasestorage.app",
            messagingSenderId: "674799529579",
            appId: "1:674799529579:web:813f9c27b2ee8f17e68b2e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function getWeekNumber() {
            const d = new Date(); d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(),0,1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }
        const currentWeek = `2026-W${getWeekNumber()}`;
        document.getElementById('display-semana').innerText = `SEMANA: ${currentWeek}`;

        function validarPassword() {
            if(document.getElementById('input-password').value === PASSWORD_SISTEMA) {
                document.getElementById('seccion-login').classList.add('oculto');
                document.getElementById('seccion-admin').classList.remove('oculto');
                arrancarAdmin();
            } else {
                document.getElementById('error-msg').classList.remove('oculto');
            }
        }

        function arrancarAdmin() {
            const main = document.getElementById('contenedor-agendas');
            const barberos = ["Barbero 1", "Barbero 2", "Barbero 3", "Barbero 4"];
            const dias = ["Lunes", "Martes", "Miercoles", "Jueves", "Viernes", "Sabado", "Domingo"];
            db.ref(`citas/${currentWeek}`).on('value', (snapshot) => {
                main.innerHTML = "";
                const data = snapshot.val() || {};
                barberos.forEach(barber => {
                    const card = document.createElement('div');
                    card.className = "bg-zinc-900/50 rounded-3xl p-6 border border-zinc-800";
                    card.innerHTML = `<h2 class="text-[10px] font-black mb-5 text-zinc-500 uppercase tracking-widest border-b border-zinc-800 pb-2">${barber}</h2>`;
                    const list = document.createElement('div');
                    list.className = "space-y-3";
                    let hay = false;
                    dias.forEach(dia => {
                        const citas = data[dia] ? data[dia][barber] : null;
                        if(citas) {
                            Object.keys(citas).forEach(id => {
                                hay = true;
                                const c = citas[id];
                                let num = c.tel.replace(/\D/g, ''); if(num.length === 10) num = "52"+num;
                                const row = document.createElement('div');
                                row.className = "flex justify-between items-center bg-black p-4 rounded-2xl border border-zinc-800";
                                row.innerHTML = `<div><p class="text-[8px] text-orange-500 font-bold uppercase">${dia} - ${c.hora}</p><p class="text-sm font-bold text-white">${c.cliente}</p><a href="https://wa.me/${num}" target="_blank" class="text-[9px] text-green-500 font-bold uppercase underline mt-1 italic tracking-tighter">WhatsApp</a></div><button onclick="liberarCita('${dia}','${barber}','${id}')" class="text-red-500 text-[9px] font-black uppercase tracking-widest">Liberar</button>`;
                                list.appendChild(row);
                            });
                        }
                    });
                    if(!hay) list.innerHTML = `<p class="text-[10px] text-zinc-800 italic text-center py-2">Sin citas</p>`;
                    card.appendChild(list);
                    main.appendChild(card);
                });
            });
        }

        function liberarCita(dia, barber, id) {
            if(confirm("¿Borrar cita?")) db.ref(`citas/${currentWeek}/${dia}/${barber}/${id}`).remove();
        }

        function toggleDescanso(estado) {
            const dia = document.getElementById('select-dia-descanso').value;
            const barber = document.getElementById('select-barber-descanso').value;
            if (estado) {
                db.ref(`config/descansos/${currentWeek}/${dia}/${barber}`).set(true)
                .then(() => alert(`🚫 ${barber} bloqueado para el ${dia}`));
            } else {
                db.ref(`config/descansos/${currentWeek}/${dia}/${barber}`).remove()
                .then(() => alert(`✅ ${barber} activado para el ${dia}`));
            }
        }
    </script>
</body>
</html>
