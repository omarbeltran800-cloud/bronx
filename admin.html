<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bronx Admin | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .oculto { display: none !important; }
        .card-barbero { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s; }
        input:focus { border-color: #f97316 !important; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="seccion-login" class="fixed inset-0 bg-black flex flex-col items-center justify-center p-6 z-50">
        <h1 class="text-4xl font-black italic mb-8 tracking-tighter uppercase">Bronx <span class="text-orange-500">Admin</span></h1>
        <div class="w-full max-w-xs space-y-4 text-center">
            <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-[0.2em]">Introduzca Código de Acceso</p>
            <input type="password" id="input-password" placeholder="••••••••" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center text-lg outline-none text-white font-mono">
            <button onclick="validarPassword()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[11px] tracking-widest active:scale-95 transition-all">Entrar al Sistema</button>
            <p id="error-msg" class="text-red-600 text-[10px] font-black oculto uppercase tracking-widest">Acceso Denegado</p>
        </div>
    </div>

    <div id="seccion-admin" class="oculto">
        <header class="mb-10 border-b border-zinc-900 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter">Panel de <span class="text-orange-500">Citas</span></h1>
                <p id="display-semana" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900 text-zinc-500 text-[9px] font-black px-4 py-2 rounded-full border border-zinc-800 uppercase">Cerrar Sesión</button>
        </header>

        <div id="contenedor-agendas" class="space-y-8">
            <p class="text-center text-zinc-700 text-xs animate-pulse">Sincronizando con la nube...</p>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE ACCESO ===
        const PASSWORD_SISTEMA = "BRONX2026"; 

        // === CONFIGURACIÓN FIREBASE (Tijuana Server) ===
        const firebaseConfig = {
            apiKey: "AIzaSyD16imBLTSC6YhiwKJK5PGza5g3a1N3J08",
            authDomain: "bronxbarber-d9cb3.firebaseapp.com",
            databaseURL: "https://bronxbarber-d9cb3-default-rtdb.firebaseio.com",
            projectId: "bronxbarber-d9cb3",
            storageBucket: "bronxbarber-d9cb3.firebasestorage.app",
            messagingSenderId: "674799529579",
            appId: "1:674799529579:web:813f9c27b2ee8f17e68b2e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Lógica de Seguridad
        function validarPassword() {
            const digitado = document.getElementById('input-password').value;
            const login = document.getElementById('seccion-login');
            const admin = document.getElementById('seccion-admin');
            const error = document.getElementById('error-msg');

            if(digitado === PASSWORD_SISTEMA) {
                login.classList.add('oculto');
                admin.classList.remove('oculto');
                arrancarAdmin();
            } else {
                error.classList.remove('oculto');
                document.getElementById('input-password').value = "";
            }
        }

        // 2. Cálculo de Semana ISO
        function getWeekNumber() {
            const d = new Date(); d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(),0,1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }
        const currentWeek = `2026-W${getWeekNumber()}`;
        document.getElementById('display-semana').innerText = `Gestión Semanal: ${currentWeek}`;

        // 3. Carga de Datos en Tiempo Real
        function arrancarAdmin() {
            const main = document.getElementById('contenedor-agendas');
            const barberos = ["Barbero 1", "Barbero 2", "Barbero 3", "Barbero 4"];
            const dias = ["Lunes", "Martes", "Miercoles", "Jueves", "Viernes", "Sabado", "Domingo"];

            db.ref(`citas/${currentWeek}`).on('value', (snapshot) => {
                main.innerHTML = "";
                const data = snapshot.val() || {};

                barberos.forEach(barber => {
                    const card = document.createElement('div');
                    card.className = "card-barbero rounded-[2.5rem] p-6";
                    card.innerHTML = `<h2 class="text-[11px] font-black mb-5 text-zinc-500 uppercase tracking-[0.3em] border-b border-zinc-900 pb-3">${barber}</h2>`;
                    
                    const list = document.createElement('div');
                    list.className = "space-y-4";
                    let hayCitas = false;

                    dias.forEach(dia => {
                        const citasDelDia = data[dia] ? data[dia][barber] : null;
                        if(citasDelDia) {
                            Object.keys(citasDelDia).forEach(idCita => {
                                hayCitas = true;
                                const cita = citasDelDia[idCita];

                                // --- LÓGICA DE WHATSAPP LIMPIO ---
                                let num = cita.tel.replace(/\D/g, ''); // Solo números
                                if (num.length === 10) num = "52" + num; // Agrega 52 si falta

                                const row = document.createElement('div');
                                row.className = "flex justify-between items-center bg-zinc-900/30 p-4 rounded-3xl border border-zinc-800/50";
                                row.innerHTML = `
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-[8px] bg-orange-600 text-white px-2 py-0.5 rounded font-black uppercase">${dia}</span>
                                            <span class="text-[10px] font-bold text-white">${cita.hora}</span>
                                        </div>
                                        <p class="text-sm font-bold text-white leading-none mb-2">${cita.cliente}</p>
                                        <a href="https://wa.me/${num}" target="_blank" class="inline-flex items-center gap-1.5 text-[10px] text-green-500 font-bold hover:text-green-400 transition-colors uppercase tracking-tighter">
                                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.653a11.888 11.888 0 005.685 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                            Contactar
                                        </a>
                                    </div>
                                    <button onclick="liberarCita('${dia}','${barber}','${idCita}')" class="ml-4 bg-red-950/20 text-red-500 text-[9px] font-black px-4 py-3 rounded-2xl border border-red-900/30 active:bg-red-600 active:text-white transition-all uppercase tracking-widest">
                                        Liberar
                                    </button>
                                `;
                                list.appendChild(row);
                            });
                        }
                    });

                    if(!hayCitas) list.innerHTML = `<p class="text-[10px] text-zinc-800 italic font-bold tracking-widest text-center py-2">--- Agenda Libre ---</p>`;
                    card.appendChild(list);
                    main.appendChild(card);
                });
            });
        }

        // 4. Función de Eliminación
        function liberarCita(dia, barbero, id) {
            if(confirm(`¿Confirmas liberar este espacio de las ${id} para ${barbero}?`)) {
                db.ref(`citas/${currentWeek}/${dia}/${barbero}/${id}`).remove()
                .catch(err => alert("Error: " + err));
            }
        }
    </script>
</body>
</html>
